services:
  commandas:
    image: aldaiirnava/murmmy-commandas:latest
    ports:
      - "3000:3000"
    volumes:
      - ${DATA_DIR:-./commandas-data}:/app/data
    environment:
      - PORT=3000
      - JWT_SECRET=murmmy-commandas-secret-key
      - DB_PATH=/app/data/commandas.db
    restart: unless-stopped
